name: Metrics

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics-${{ github.repository }}
  cancel-in-progress: true

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: github-metrics.svg
          output_action: commit
          committer_branch: ${{ github.event.repository.default_branch }}
          committer_message: "chore: update github-metrics.svg"
          config_timezone: UTC
          template: classic
          base: header
          config_order: header, activity, stars
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_visibility: public
          plugin_activity_timestamps: no
          plugin_stars: yes
          plugin_stars_limit: 3
